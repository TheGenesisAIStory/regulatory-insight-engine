base_model_name: Qwen/Qwen2.5-3B-Instruct
output_dir: fiorellia/training/lora/fiorellia_behavior_20260421
dataset_path: fiorellia/training/supervised_v1_curated_20260421.jsonl

seed: 42
validation_split_ratio: 0.2
max_seq_length: 1024
learning_rate: 0.0001
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
warmup_ratio: 0.05
logging_steps: 5
save_steps: 50
save_strategy: epoch
eval_strategy: epoch
save_total_limit: 3

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

use_4bit: true
allow_mps: false
