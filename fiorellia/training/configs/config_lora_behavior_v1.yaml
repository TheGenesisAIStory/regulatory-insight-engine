base_model_name: Qwen/Qwen2.5-3B-Instruct
output_dir: fiorellia/training/lora/fiorellia_behavior_v1
dataset_path: fiorellia/training/supervised_v1_unsupported_seed.jsonl

max_seq_length: 1024
learning_rate: 0.0001
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
warmup_ratio: 0.05
logging_steps: 5
save_steps: 50

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

use_4bit: true
allow_mps: false
